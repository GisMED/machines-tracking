<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مواقع مكائن التعبئة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F6F5F1;--card:#fff;--ink:#0E2A2B;--teal:#15605F;--teal-d:#0F4948;--amber:#F2A900;
    --line:#E5E3DC;--muted:#6B6F6E;--has:#1E8E5A;--none:#9AA0A0;--err:#C0432F;
    --shadow:0 1px 2px rgba(14,42,43,.05),0 6px 18px rgba(14,42,43,.06);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans Arabic",system-ui,Tahoma,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .num{font-family:"IBM Plex Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px;}
  header{position:sticky;top:0;z-index:10;background:rgba(246,245,241,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 14px) 0 14px;}
  .hrow{display:flex;align-items:center;gap:11px}
  .mark{width:34px;height:34px;border-radius:9px;background:var(--teal);position:relative;flex:0 0 auto}
  .mark::after{content:"";position:absolute;inset:0;margin:auto;width:9px;height:13px;background:var(--amber);border-radius:0 50% 50% 50%;transform:translateY(-1px) rotate(45deg)}
  h1{font-size:17px;font-weight:700;margin:0}
  .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .refresh{margin-inline-start:auto;background:#fff;border:1.5px solid var(--line);border-radius:10px;width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--teal);flex:0 0 auto}
  .refresh:hover{border-color:var(--teal)} .refresh svg{width:19px;height:19px}
  .refresh.spinning svg{animation:r 1s linear infinite}@keyframes r{to{transform:rotate(360deg)}}
  main{padding:18px 0 40px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
  .row{display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}.dot.has{background:var(--has)}.dot.none{background:var(--none)}
  .sn{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:16px;letter-spacing:.3px}
  .loc{font-size:13px;color:var(--muted);margin-top:6px}.loc.none{color:var(--none)}
  .go{margin-inline-start:auto;display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff;border:none;
    border-radius:999px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;flex:0 0 auto}
  .go:hover{background:var(--teal-d)}.go:active{transform:translateY(1px)}.go svg{width:16px;height:16px}
  .state{text-align:center;padding:50px 20px;color:var(--muted)}
  .state .em{font-size:30px;margin-bottom:10px;opacity:.5}
  .state h3{color:var(--ink);font-size:16px;margin:0 0 6px}.state p{font-size:13.5px;margin:0}
  .state.error h3{color:var(--err)}
</style>
</head>
<body>
<header>
  <div class="wrap hrow">
    <div class="mark" aria-hidden="true"></div>
    <div><h1>مواقع مكائن التعبئة</h1><div class="sub" id="sub">جارٍ التحميل…</div></div>
    <button class="refresh" id="refresh" type="button" title="تحديث">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></svg>
    </button>
  </div>
</header>
<main class="wrap"><div id="list"><div class="state"><p>جارٍ التحميل…</p></div></div></main>

<script src="config.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function mapsLink(la,ln){ return "https://www.google.com/maps/dir/?api=1&destination="+la+","+ln; }
  function openMaps(la,ln){ window.open(mapsLink(la,ln),"_blank","noopener"); }

  function jsonp(params){
    return new Promise(function(resolve,reject){
      var cb="cb_"+Math.random().toString(36).slice(2), s=document.createElement("script");
      var timer=setTimeout(function(){cleanup();reject(new Error("timeout"));},15000);
      function cleanup(){clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}
      window[cb]=function(d){cleanup();resolve(d);};
      var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);}).join("&");
      s.src=CONFIG.API_URL+"?"+qs+"&callback="+cb; s.onerror=function(){cleanup();reject(new Error("network"));};
      document.head.appendChild(s);
    });
  }

  function render(items){
    var n=items.length;
    $("sub").textContent = n===0?"لا توجد مكائن":(n===1?"مكينة واحدة":n===2?"مكينتان":n<=10?n+" مكائن":n+" مكينة");
    if(n===0){ $("list").innerHTML='<div class="state"><div class="em">⛽</div><h3>لا توجد مكائن بعد</h3><p>أضف الأرقام التسلسلية في جدول Google Sheet.</p></div>'; return; }
    items.sort(function(a,b){ return (a.lat!=null?0:1)-(b.lat!=null?0:1); });
    $("list").innerHTML = items.map(function(m){
      var has = m.lat!=null && m.lng!=null;
      return '<div class="card"><div class="row">'+
        '<span class="dot '+(has?"has":"none")+'"></span>'+
        '<span class="sn">'+esc(m.serial)+'</span>'+
        (has?'<button class="go" onclick="openMaps('+(+m.lat)+','+(+m.lng)+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>الذهاب</button>':'')+
        '</div>'+
        (has?'<div class="loc num">'+(+m.lat).toFixed(5)+', '+(+m.lng).toFixed(5)+'</div>':'<div class="loc none">لم يُحدَّد موقعها بعد</div>')+
        '</div>';
    }).join("");
  }

  function showError(msg){
    $("sub").textContent="تعذّر التحميل";
    $("list").innerHTML='<div class="state error"><h3>تعذّر تحميل البيانات</h3><p>'+esc(msg)+'</p></div>';
  }

  var loading=false;
  function load(){
    if(loading) return; loading=true;
    $("refresh").classList.add("spinning");
    if(!CONFIG||!CONFIG.API_URL||CONFIG.API_URL.indexOf("http")!==0){ showError("لم يُضبط رابط الخادم في config.js"); loading=false; $("refresh").classList.remove("spinning"); return; }
    jsonp({action:"list",token:CONFIG.TOKEN})
      .then(function(r){
        if(r&&r.ok&&Array.isArray(r.items)) render(r.items);
        else showError(r&&r.error==="unauthorized"?"كلمة المرور غير متطابقة (token).":((r&&r.error)||"استجابة غير متوقعة"));
      })
      .catch(function(){ showError("تعذّر الوصول للخادم. تحقق من الإنترنت ومن رابط النشر."); })
      .then(function(){ loading=false; $("refresh").classList.remove("spinning"); });
  }

  $("refresh").addEventListener("click", load);
  load();
  setInterval(load, 30000);   // تحديث تلقائي كل ٣٠ ثانية
</script>
</body>
</html>
